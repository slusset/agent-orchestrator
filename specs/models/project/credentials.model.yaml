id: credentials
type: model
entity: CredentialManifest
aggregate: ProjectContext
description: |
  Credential manifest and pluggable resolution for agent task dispatch.
  The PA resolves credentials before dispatching TaskBundles — agents
  never manage their own auth.

  The manifest (.pm/credentials.yaml) declares WHAT secrets a project
  needs. Pluggable CredentialProviders resolve values at runtime from
  env vars, .env files, SOPS-encrypted files, or other backends.
  ChainProvider composes multiple providers with priority fallback.

  Resolved credentials flow through TaskBundle.resolved_env (excluded
  from serialization) into AgentCLI subprocess environment.

sources:
  stories:
    - specs/stories/orchestration/pa-resolves-credentials.md
  journeys:
    - specs/journeys/feature-request-lifecycle.md
  features:
    - specs/features/orchestration/pa-resolves-credentials.feature

# ---------------------------------------------------------------------------
# Credential Manifest (checked into repo, no secret values)
# ---------------------------------------------------------------------------

credential_spec:
  description: |
    A single credential the project needs. Declares WHAT is needed,
    WHERE to find it, and WHO (which roles) need it.
  fields:
    name:
      type: str
      description: Canonical name, e.g. "ANTHROPIC_API_KEY"
    required:
      type: bool
      default: true
      description: Whether the PA should fail-fast if this credential is missing
    source:
      type: CredentialSource
      default: env
      description: Hint for which provider should resolve this
      enum: [env, sops, vault, config]
    description:
      type: str
      description: Human-readable purpose of this credential
    env_var:
      type: str | null
      description: Override — look for this env var name instead of `name`
    roles:
      type: list[str]
      default: []
      description: |
        Which agent roles need this credential. Empty list = all roles.
        Example: ["coding", "pr"] means only coding and PR agents receive it.
    scopes:
      type: list[str]
      default: []
      description: Required scopes/permissions (e.g. ["repo", "read:org"] for GitHub tokens)
  derived:
    lookup_key:
      returns: str
      description: Returns env_var if set, otherwise name

credential_manifest:
  description: |
    The full credential manifest for a project. Lives in .pm/credentials.yaml.
    Checked into the repo — no secret values, only declarations.
  fields:
    credentials:
      type: list[CredentialSpec]
  queries:
    for_role:
      args: [role: str]
      returns: list[CredentialSpec]
      description: Credentials needed by a specific role (empty roles = all roles need it)
    required:
      returns: list[CredentialSpec]
      description: All required credentials
    names:
      returns: list[str]
      description: All credential names

# ---------------------------------------------------------------------------
# Resolution (runtime value lookup)
# ---------------------------------------------------------------------------

resolved_credential:
  description: A credential with its resolved secret value
  fields:
    name: { type: str }
    value: { type: str }
    source: { type: str, description: "Which provider resolved it (env, dotenv, sops, static)" }

resolution_result:
  description: Outcome of resolving a full manifest
  fields:
    resolved: { type: "dict[str, ResolvedCredential]" }
    missing: { type: "list[str]", description: "Required credentials that no provider could resolve" }
    errors: { type: "dict[str, str]", description: "Credentials that errored during resolution" }
  derived:
    ok: { returns: bool, description: "True if no required missing and no errors" }
    as_env: { returns: "dict[str, str]", description: "Flat env dict for subprocess injection" }
    summary: { returns: str, description: "Human-readable resolution report" }

# ---------------------------------------------------------------------------
# Providers (pluggable resolution backends)
# ---------------------------------------------------------------------------

credential_provider:
  description: |
    Abstract base for credential resolution. Implementations resolve
    secret values from different backends. The PA calls resolve() at
    boot and injects results into dispatch context.
  interface:
    get:
      args: [spec: CredentialSpec]
      returns: str | null
      description: Resolve a single credential. Returns None if this provider can't.
    resolve:
      args: [manifest: CredentialManifest]
      returns: ResolutionResult
    resolve_for_role:
      args: [manifest: CredentialManifest, role: str]
      returns: ResolutionResult

  implementations:
    env:
      description: Resolves from os.environ. Default fallback.
    dotenv:
      description: |
        Reads key=value pairs from a .env file. Supports quotes,
        comments, export prefix, inline comments. Caches after
        first load; reload() to re-read.
      constructor_args: [path: Path]
    sops:
      description: |
        Shells out to `sops --decrypt <path>`. Parses output as
        dotenv (.env), YAML (.yaml/.yml), or JSON (.json) based
        on file extension. Requires sops CLI + key (age/GPG).
        Caches after first decrypt; reload() to re-decrypt.
      constructor_args: [path: Path, sops_binary: str]
    static:
      description: In-memory dict. Used for testing and CI injection.
      constructor_args: [credentials: "dict[str, str]"]
    chain:
      description: |
        Tries multiple providers in order, first match wins.
        Recommended composition: SopsProvider → DotEnvProvider → EnvProvider.
      constructor_args: [providers: "list[CredentialProvider]"]

# ---------------------------------------------------------------------------
# Integration Points
# ---------------------------------------------------------------------------

integration:
  boot_sequence:
    description: |
      OrchestratorServer.boot() loads .pm/credentials.yaml,
      resolves via configured provider, caches per-role env dicts.
      Warns on missing but does not hard-fail (graceful degradation).
    function: validate_credentials(manifest, provider, role?)

  graph_dispatch:
    description: |
      Per-role resolved env dicts are injected into graph context as
      plain dict[str, dict[str, str]] (serialization-safe for LangGraph
      checkpointing). Each dispatch node reads its role's env dict
      and sets bundle.resolved_env.
    context_key: _resolved_credentials

  task_bundle:
    description: |
      TaskBundle.resolved_env carries resolved credentials to agents.
      Field is exclude=True — never serialized to JSON, logs, or
      external systems. Only accessible in-memory.
    field: resolved_env
    serialization: excluded

  agent_cli:
    description: |
      CodingAgent merges bundle.resolved_env into AgentCLI constructor.
      AgentCLI.run() passes merged env to subprocess:
      env = {**os.environ, **self.extra_env}
