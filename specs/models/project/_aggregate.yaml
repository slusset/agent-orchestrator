aggregate: ProjectContext
root: ProjectContext
description: |
  The ProjectContext aggregate represents the durable knowledge state of a
  managed project. It is the PA's continuity boundary — everything the PM
  needs to understand a project's current state, history, and learned
  preferences across restarts, sessions, and PM instances.

  ProjectContext is NOT workflow state (that's LangGraph checkpoints) and
  NOT runtime state (that's process-ephemeral). It's the knowledge layer
  that feeds INTO the workflow at decision points.

  The PM loads ProjectContext at boot and at key decision nodes (plan_work,
  evaluate_result). It never modifies it during graph execution — mutations
  happen through dedicated tools (PlanManager, MemoryWriter, EvalRecorder).

entities:
  - ProjectContext (root)

value_objects:
  - ProjectId
  - ProjectConfig
  - AgentPreferences
  - EvalSnapshot
  - MemoryEntry
  - Workflow (see workflow.model.yaml)
  - WorkflowStep
  - FailurePolicy
  - MethodologyConfig
  - RoleDefinition (see roles.model.yaml)
  - CredentialSpec

invariants:
  - A project must have a roadmap (plan/roadmap.yaml)
  - A project must have a repo root (the directory containing .pm/)
  - A project must have a workflow definition (.pm/workflow.yaml)
  - Config values must have valid agent CLI types from the registry
  - Memory entries are append-only (can be superseded but not deleted)
  - Eval history is immutable once recorded
  - Workflow steps must reference roles with registered capability profiles
  - Workflow routing must not create unbounded cycles (max_retries required)
  - All required credentials must be validated at boot before accepting work

boundaries:
  - Roadmap is referenced, not embedded (managed by PlanManager)
  - IDD specs are referenced by path, not embedded
  - LangGraph checkpoints are a separate concern (workflow state)
  - Secrets/credentials are never stored in ProjectContext
  - Workflow defines WHAT roles execute; agents define WHO fulfills them
  - Methodology is advisory; it does not constrain the workflow pipeline
