# Credential Manifest — declares what secrets this project needs.
# No secret values here — only the manifest of what's required.
# Resolved at runtime by the configured CredentialProvider chain.

credentials:
  # --- Required: core agent operations ---
  - name: ANTHROPIC_API_KEY
    required: true
    source: env
    description: "Anthropic API key for Claude Code CLI and PA LLM calls"
    roles: [coding, pr, uat]

  - name: GITHUB_TOKEN
    required: true
    source: env
    description: "GitHub PAT for git operations, PR creation, and webhook auth"
    scopes: [repo, read:org]
    roles: [coding, pr]

  # --- Optional: alternative CLI adapters ---
  - name: OPENAI_API_KEY
    required: false
    source: env
    description: "OpenAI API key for Codex CLI adapter"
    roles: [coding]

  - name: GEMINI_API_KEY
    required: false
    source: env
    description: "Google API key for Gemini CLI adapter"
    roles: [coding]

  # --- Optional: external integrations (m5) ---
  - name: JIRA_TOKEN
    required: false
    source: env
    description: "JIRA API token for story sync and status updates"
    roles: []

  - name: CONFLUENCE_TOKEN
    required: false
    source: env
    description: "Confluence API token for spec/doc enrichment"
    roles: []
